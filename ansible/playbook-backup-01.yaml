---
- name: Configure backup-01
  hosts: backup-01
  become: true

  tasks:
    - name: Configure pbs_config
      ansible.builtin.import_role:
        name: pbs_config

    - name: Configure pbs_acme_certificate
      ansible.builtin.import_role:
        name: pbs_acme_certificate

    - name: Configure ntp
      ansible.builtin.import_role:
        name: geerlingguy.ntp

    - name: Configure configure_server
      ansible.builtin.import_role:
        name: configure_server

    - name: Configure power_saving
      ansible.builtin.import_role:
        name: power_saving

    - name: Configure zfs_conf
      ansible.builtin.import_role:
        name: zfs_conf
      vars:
        zfs_arc_max_gb: 24

    - name: Configure beszel_agent
      ansible.builtin.import_role:
        name: beszel_agent

    - name: Configure samba
      ansible.builtin.import_role:
        name: samba
      vars:
        samba_timemachine:
          path: "{{ backup_01_timemachine_path }}"
          username: "{{ backup_01_timemachine_username }}"
          password: "{{ backup_01_timemachine_password }}"
          max_size: 4T

    - name: Configure tailscale
      ansible.builtin.import_role:
        name: artis3n.tailscale.machine
      vars:
        tailscale_args: "--accept-dns=true"

    - name: Configure backup_destination
      ansible.builtin.import_role:
        name: backup_destination
      vars:
        syncoid_destination_username: "syncoid"
        syncoid_source_ssh_public_keys:
          - "{{ nas_01_syncoid_ssh_public_key }}"
        syncoid_destination_dataset: backups

    - name: Configure nut
      ansible.builtin.import_role:
        name: nut
      vars:
        nut_enable_client: true
        nut_client_servers:
          - ups_name: "{{ ups_monitor_rack_nut_ups_name }}"
            server_address: "{{ ups_monitor_rack_nut_server_address }}"
            username: "{{ nut_client_username }}"
            password: "{{ nut_client_password }}"

    - name: Configure healthchecks_service
      ansible.builtin.import_role:
        name: healthchecks_service

    - name: Configure remote_power_control
      ansible.builtin.import_role:
        name: remote_power_control
      vars:
        remote_power_control_target: true
        remote_power_control_target_username: kvmd
        remote_power_control_client: true
        remote_power_control_extra_profiles:
          offsite: "{{ remote_power_control_profile_offsite }}"

    - name: Configure sanoid
      ansible.builtin.import_role:
        name: sanoid
      vars:
        sanoid_dataset_configs:
          backups/pbs:
            autosnap: true
            autoprune: true
            recursive: true
            frequently: 0
            hourly: 0
            daily: 30
            monthly: 1
            yearly: 0

    - name: Configure offsite-nas as a syncoid destination
      vars:
        syncoid_destination_host: "offsite-nas.{{ tailscale_tailnet }}"
        syncoid_destination_username: "{{ offsite_nas_syncoid_username }}"
        syncoid_source_ssh_key_path: "/home/{{ ansible_user }}/.ssh/id_ed25519_syncoid"
        shutdown_tracker_complete_caller_script_path: "/usr/local/bin/shutdown_tracker_complete_call_{{ syncoid_destination_host | replace('.', '_') }}"
      block:
        - name: Configure shutdown_tracker source for offsite-nas
          ansible.builtin.include_role:
            name: shutdown_tracker
          vars:
            shutdown_tracker_source: true
            shutdown_tracker_source_ssh_key_path: "{{ syncoid_source_ssh_key_path }}"
            shutdown_tracker_destination_host: "{{ syncoid_destination_host }}"
            shutdown_tracker_destination_username: "{{ syncoid_destination_username }}"
        - name: Configure syncoid to offsite-nas
          ansible.builtin.include_role:
            name: syncoid_source
          vars:
            syncoid_source_username: "{{ ansible_user }}"
            syncoid_source_ssh_private_key: "{{ backup_01_syncoid_ssh_private_key }}"
            syncoid_pre_sync_commands:
              - "/usr/local/bin/remote_power_control --profile offsite offsite-pikvm.{{ tailscale_tailnet }} pikvm on"
            syncoid_post_sync_commands:
              - "{{ shutdown_tracker_complete_caller_script_path }} backup-01"
            syncoid_timer_on_calendar: "*-*-* 04:00:00"
            syncoid_datasets:
              - syncoid_source_dataset: backups/pbs
                syncoid_destination_dataset: backups/pbs
                syncoid_destination_dataset_mountpoint: /mnt/backups/pbs
                syncoid_healthchecks_uuid: 832862e4-2c1e-4332-a3c4-ecf6ddeba1d3

    - name: Copy 10-arp-flux.conf
      ansible.builtin.copy:
        src: files/backup-01/10-arp-flux.conf
        dest: /etc/sysctl.d/10-arp-flux.conf
        mode: "0644"
        owner: root
        group: root

    - name: Configure network interfaces
      ansible.builtin.copy:
        src: files/backup-01/interfaces
        dest: /etc/network/interfaces
        mode: "0644"
        owner: root
        group: root
