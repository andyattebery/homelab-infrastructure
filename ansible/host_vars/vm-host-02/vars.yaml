# Ceph cluster network NIC — identified by MAC so we don't depend on the
# pinned name the installer assigned (nic1 today, could be different on a
# rebuild). No `gateway` is configured: the cluster network is /24 LAN
# with no router-out, and a second `gateway` directive in
# /etc/network/interfaces would conflict with vmbr0's default route under
# ifupdown2 and result in no default route at all.
ceph_cluster_nic_mac: "1c:fd:08:75:10:24"
ceph_cluster_nic_address: "10.1.40.12/24"
security_ssh_permit_root_login: "prohibit-password"
