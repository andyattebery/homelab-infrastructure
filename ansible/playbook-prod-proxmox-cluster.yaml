---
- name: Configure prod Proxmox cluster nodes (vm-host-01, vm-host-02, nas-host-01)
  hosts: prod_proxmox_cluster
  become: true

  tasks:
    # ---------- Local-only / pre-cluster ----------
    - name: Configure PVE apt sources
      ansible.builtin.import_role:
        name: pve_config

    - name: Add contrib, non-free, non-free-firmware to active Debian apt sources
      ansible.builtin.import_role:
        name: debian_extra_components

    - name: Install base packages
      ansible.builtin.apt:
        name: "{{ extra_packages | default([]) }}"

    - name: Apt dist-upgrade
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true

    - name: Install r8125 driver (Realtek 2.5 GbE PCIe interface)
      when: install_realtek_r8125 | default(false)
      ansible.builtin.import_role:
        name: realtek_dkms
      vars:
        realtek_dkms_driver: r8125

    - name: Install r8152 driver (Realtek 5 GbE USB interface)
      when: install_realtek_r8152 | default(false)
      ansible.builtin.import_role:
        name: realtek_dkms
      vars:
        realtek_dkms_driver: r8152

    - name: Configure NTP
      ansible.builtin.import_role:
        name: geerlingguy.ntp

    - name: Configure server (SSH keys, locale, timezone, security baseline, dotfiles)
      ansible.builtin.import_role:
        name: configure_server

    - name: Configure Scrutiny collector
      ansible.builtin.import_role:
        name: scrutiny_collector

    - name: Configure prometheus node_exporter
      ansible.builtin.import_role:
        name: prometheus.prometheus.node_exporter

    - name: Configure power saving
      ansible.builtin.import_role:
        name: power_saving

    - name: Configure kernel parameters
      when: kernel_parameters_new_parameters is defined
      ansible.builtin.import_role:
        name: kernel_parameters

    - name: Configure NUT (UPS) client
      vars:
        nut_enable_client: true
        nut_client_servers:
          - ups_name: "{{ ups_monitor_rack_nut_ups_name }}"
            server_address: "{{ ups_monitor_rack_nut_server_address }}"
            username: "{{ nut_client_username }}"
            password: "{{ nut_client_password }}"
      ansible.builtin.import_role:
        name: nut

    # - name: Configure remote power control client
    #   vars:
    #     remote_power_control_client: true
    #   ansible.builtin.import_role:
    #     name: remote_power_control

    # Migrate when the pikvm-side playbook is also updated:
    # - name: Configure remote power control target (for PiKVM)
    #   vars:
    #     remote_power_control_target: true
    #     remote_power_control_target_username: kvmd
    #     remote_power_control_target_authorized_key: "{{ pikvm_kvmd_ssh_public_key }}"
    #   ansible.builtin.import_role:
    #     name: remote_power_control

    # The PVE installer owns the management NIC config (vmbr0 + its
    # bridge port). We add the Ceph cluster network NIC stanza, plus any
    # additional NICs declared in `extra_network_interfaces` (host_var).
    - name: Configure Ceph cluster network NIC
      vars:
        debian_add_network_interface_filename: ceph-cluster
        debian_add_network_interface_mac: "{{ ceph_cluster_nic_mac }}"
        debian_add_network_interface_method: static
        debian_add_network_interface_address_cidr: "{{ ceph_cluster_nic_address_cidr }}"
        debian_add_network_interface_wol: pumbg
      ansible.builtin.import_role:
        name: debian_add_network_interface

    - name: Configure additional network interfaces
      vars:
        debian_add_network_interface_filename: "{{ item.filename }}"
        debian_add_network_interface_mac: "{{ item.mac }}"
        debian_add_network_interface_method: "{{ item.method | default('static') }}"
        debian_add_network_interface_address_cidr: "{{ item.address_cidr | default('') }}"
        debian_add_network_interface_wol: "{{ item.wol | default('') }}"
      ansible.builtin.include_role:
        name: debian_add_network_interface
      loop: "{{ extra_network_interfaces | default([]) }}"

    # ---------- (a) Bootstrap (fresh-cluster only) ----------
    # pve_cluster_create now self-detects: stats /etc/pve/corosync.conf
    # on every inventory peer and skips `pvecm create` if any peer has
    # it. So this is safe to run unconditionally — on re-provision it
    # no-ops, on fresh bootstrap it creates exactly one cluster.
    # Gated on the designated runner so only one host attempts the
    # create.
    - name: Create Proxmox cluster (fresh bootstrap only)
      when: inventory_hostname == pve_cluster_designated_runner
      ansible.builtin.import_role:
        name: pve_cluster_create

    # ---------- (b) Per-node cluster join ----------
    # Idempotent: short-circuits if /etc/pve/corosync.conf already
    # exists. Verify-quorate at the end fails the play if any host
    # didn't end up in a healthy quorate cluster.
    - name: Join Proxmox cluster
      ansible.builtin.import_role:
        name: pve_cluster_add_node

    # ---------- (c) Cluster-wide writes (designated runner only) ----------
    # Runs after (b) so the runner is provably in the cluster
    # (linear strategy + the verify-quorate at the end of (b)
    # together guarantee that). All sub-roles are idempotent against
    # /etc/pve cluster state, so re-runs are safe.
    - name: Configure cluster-wide PVE state
      when: inventory_hostname == pve_cluster_designated_runner
      block:
        - name: Configure cluster-level ACME
          ansible.builtin.import_role:
            name: pve_cluster_acme

        - name: Add nas-01_proxmox storage
          ansible.builtin.import_role:
            name: pve_storage_add_nas_01_proxmox

        - name: Add backup-01 PBS storage
          ansible.builtin.import_role:
            name: pve_storage_add_backup_01_pbs

    # ---------- (d) Per-node cluster-dependent config ----------
    - name: Configure node ACME
      ansible.builtin.import_role:
        name: pve_node_acme

    - name: Configure PVE backup job script
      ansible.builtin.import_role:
        name: pve_backup_job_script

    # ---------- Ceph ----------
    # Per-node ceph runs on every host: install → init (gated on the
    # designated runner inside the role, idempotent) → mon/mgr/mds/OSD.
    # Order is preserved by Ansible's task-by-task scheduling: the
    # runner's `pveceph init` task completes on all hosts (runner runs
    # it, others skip via the when-gate) before any host moves on to
    # `pveceph mon create`.
    - name: Configure per-node Ceph (install, init on designated runner, services)
      ansible.builtin.import_role:
        name: pve_node_ceph

    # Cluster-wide ceph storage — pool + cephfs. Designated runner only;
    # propagates via pmxcfs. Runs after pve_node_ceph so at least one MDS
    # exists.
    - name: Configure cluster-wide Ceph storage (designated runner only)
      when: inventory_hostname == pve_cluster_designated_runner
      ansible.builtin.import_role:
        name: pve_cluster_ceph
