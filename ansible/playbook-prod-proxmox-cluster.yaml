---
- name: Configure prod Proxmox cluster nodes (vm-host-01, vm-host-02)
  hosts: vm-host-01,vm-host-02
  become: true

  vars:
    pve_backup_job_script_job_init_commands:
      - /usr/local/bin/remote_power_control pikvm on

  tasks:
    # ---------- Local-only / pre-cluster ----------
    - name: Configure PVE apt sources
      ansible.builtin.import_role:
        name: pve_config

    - name: Add contrib, non-free, non-free-firmware to active Debian apt sources
      ansible.builtin.import_role:
        name: debian_extra_components

    - name: Install base packages
      ansible.builtin.apt:
        name: "{{ ['intel-microcode'] + (extra_packages | default([])) }}"

    - name: Install r8125 driver via DKMS package + udev swap
      ansible.builtin.import_role:
        name: realtek_r8125_dkms_package

    - name: Install r8152 driver (USB Realtek)
      when: inventory_hostname == 'vm-host-01'
      ansible.builtin.import_role:
        name: realtek_r8152_dkms

    - name: Configure NTP
      ansible.builtin.import_role:
        name: geerlingguy.ntp

    - name: Configure server (SSH keys, locale, timezone, security baseline, dotfiles)
      ansible.builtin.import_role:
        name: configure_server

    - name: Configure Scrutiny collector
      ansible.builtin.import_role:
        name: scrutiny_collector

    - name: Configure prometheus node_exporter
      ansible.builtin.import_role:
        name: prometheus.prometheus.node_exporter

    - name: Configure power saving
      vars:
        power_saving_pcie_runtime_all_devices: true
        power_saving_sata_all_devices: true
      ansible.builtin.import_role:
        name: power_saving

    - name: Configure kernel parameters (intel_iommu)
      vars:
        kernel_parameters_new_parameters:
          intel_iommu: "on"
      ansible.builtin.import_role:
        name: kernel_parameters

    - name: Configure NUT (UPS) client
      vars:
        nut_enable_client: true
        nut_client_servers:
          - ups_name: "{{ ups_monitor_rack_nut_ups_name }}"
            server_address: "{{ ups_monitor_rack_nut_server_address }}"
            username: "{{ nut_client_username }}"
            password: "{{ nut_client_password }}"
      ansible.builtin.import_role:
        name: nut

    - name: Configure remote power control client
      vars:
        remote_power_control_client: true
      ansible.builtin.import_role:
        name: remote_power_control

    - name: Configure PiKVM remote command
      vars:
        pikvm_remote_command_ssh_public_key: "{{ pikvm_kvmd_ssh_public_key }}"
      ansible.builtin.import_role:
        name: pikvm_remote_command

    # The PVE installer owns the management NIC config (vmbr0 + its
    # bridge port). We add the Ceph cluster network NIC stanza, plus any
    # additional NICs declared in `extra_network_interfaces` (host_var).
    - name: Configure Ceph cluster network NIC
      vars:
        debian_add_network_interface_filename: ceph-cluster
        debian_add_network_interface_mac: "{{ ceph_cluster_nic_mac }}"
        debian_add_network_interface_method: static
        debian_add_network_interface_address_cidr: "{{ ceph_cluster_nic_address_cidr }}"
        debian_add_network_interface_wol: pumbg
      ansible.builtin.import_role:
        name: debian_add_network_interface

    - name: Configure additional network interfaces
      vars:
        debian_add_network_interface_filename: "{{ item.filename }}"
        debian_add_network_interface_mac: "{{ item.mac }}"
        debian_add_network_interface_method: "{{ item.method | default('static') }}"
        debian_add_network_interface_address_cidr: "{{ item.address_cidr }}"
        debian_add_network_interface_wol: "{{ item.wol | default(omit) }}"
      ansible.builtin.include_role:
        name: debian_add_network_interface
      loop: "{{ extra_network_interfaces | default([]) }}"

    # ---------- Cluster bootstrap + cluster-wide config (founder only) ----------
    # Creates the cluster (idempotent — pve_cluster_create checks
    # /etc/pve/corosync.conf and skips if a cluster already exists), then
    # writes cluster-shared state to /etc/pve (ACME account + DNS plugin,
    # storage definitions). All of it propagates to other nodes via pmxcfs
    # once they join — run once on the founder.
    - name: Bootstrap and configure cluster-wide PVE state
      when: pve_cluster_founder | default(false)
      block:
        - name: Create Proxmox cluster
          ansible.builtin.import_role:
            name: pve_cluster_create

        - name: Configure cluster-level ACME
          ansible.builtin.import_role:
            name: pve_cluster_acme

        - name: Add nas-01_proxmox storage
          ansible.builtin.import_role:
            name: pve_storage_add_nas_01_proxmox

        - name: Add backup-01 PBS storage
          ansible.builtin.import_role:
            name: pve_storage_add_backup_01_pbs

    # ---------- Per-node cluster-dependent config ----------
    # pve_cluster_add_node also checks /etc/pve/corosync.conf, so it's a no-op
    # on the founder.
    - name: Join Proxmox cluster
      ansible.builtin.import_role:
        name: pve_cluster_add_node

    - name: Configure node ACME
      ansible.builtin.import_role:
        name: pve_node_acme

    - name: Configure PVE backup job script
      ansible.builtin.import_role:
        name: pve_backup_job_script

    # ---------- Ceph ----------
    # Per-node ceph runs on every host: install → init (founder-gated inside
    # the role, idempotent) → mon/mgr/mds/OSD. Order is preserved by Ansible's
    # task-by-task scheduling: the founder's `pveceph init` task completes on
    # all hosts (founder runs it, others skip via the when-gate) before any
    # host moves on to `pveceph mon create`.
    - name: Configure per-node Ceph (install, init on founder, services)
      ansible.builtin.import_role:
        name: pve_node_ceph

    # Cluster-wide ceph storage — pool + cephfs. Founder only; propagates via
    # pmxcfs. Runs after pve_node_ceph so at least one MDS exists.
    - name: Configure cluster-wide Ceph storage (founder only)
      when: pve_cluster_founder | default(false)
      ansible.builtin.import_role:
        name: pve_cluster_ceph
