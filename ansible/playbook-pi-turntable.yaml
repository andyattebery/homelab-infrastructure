---
- name: Configure pi-turntable
  hosts: pi-turntable
  become: true

  roles:
    # - role: configure_server
  #   - role: geerlingguy.docker
    - role: docker_compose_traefik
      vars:
        docker_compose_copy_scripts: true
        docker_compose_traefik_enable_dashboard: true
        docker_compose_traefik_enable_host_network: true
        # docker_compose_traefik_file_provider_path: files/pi-turntable/file_provider.yml
    - role: docker_compose_dashboard_services_manager_provider
    - role: docker_compose_owntone

  tasks:
    - name: Install packages
      ansible.builtin.package:
        name:
          - alsa-utils
          - sox
          # - ffmpeg
          # - icecast2
    - name: Copy turntable-pipe.service
      ansible.builtin.template:
        src: files/pi-turntable/turntable-pipe.service
        dest: /etc/systemd/system/turntable-pipe.service
        mode: "0644"
        owner: root
    - name: Enable and start turntable-pipe.service
      ansible.builtin.systemd_service:
        daemon_reload: true
        name: turntable-pipe.service
        state: started
        enabled: true
