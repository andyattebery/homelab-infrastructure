---
- name: Get node config
  ansible.builtin.uri:
    url: "{{ pbs_api_base_url }}/nodes/{{ ansible_facts['hostname'] }}/config"
    method: GET
    headers: "{{ pbs_api_headers }}"
    validate_certs: false
    return_content: true
  register: pbs_node_config_result

- name: Add ACME domain to node
  vars:
    node_fqdn: "{{ ansible_facts['hostname'] }}.{{ domain_name }}"
    pbs_node_config_data: "{{ (pbs_node_config_result.content | from_json).data }}"
  when: >-
    pbs_node_config_data.acmedomain0 is not defined
    or pbs_node_config_data.acmedomain0 | length == 0
  ansible.builtin.uri:
    url: "{{ pbs_api_base_url }}/nodes/{{ ansible_facts['hostname'] }}/config"
    method: PUT
    headers: "{{ pbs_api_headers }}"
    validate_certs: false
    body_format: form-urlencoded
    body:
      acmedomain0: "domain={{ node_fqdn }},plugin=cloudflare"
    status_code: [200]

- name: Get certificates info for node
  ansible.builtin.uri:
    url: "{{ pbs_api_base_url }}/nodes/{{ ansible_facts['hostname'] }}/certificates/info"
    method: GET
    headers: "{{ pbs_api_headers }}"
    validate_certs: false
    return_content: true
  register: pbs_node_certs_info_result

- name: Order ACME certificate for node
  when:
    - (pbs_node_certs_info_result.content | from_json).data
      | selectattr('issuer', 'defined')
      | selectattr('issuer', 'search', "Let's Encrypt")
      | list | length == 0
  ansible.builtin.uri:
    url: "{{ pbs_api_base_url }}/nodes/{{ ansible_facts['hostname'] }}/certificates/acme/certificate"
    method: POST
    headers: "{{ pbs_api_headers }}"
    validate_certs: false
    status_code: [200]
  register: pbs_acme_cert_order_result

# `POST /certificates/acme/certificate` is async — it returns 200 once the
# task is queued, but the actual DNS-01 challenge and cert issuance happens
# in proxmox-backup-proxy afterward. Poll the certs list until a Let's
# Encrypt cert appears so we fail visibly if the async work fails (rate
# limit, DNS issue, plugin auth, etc) instead of silently reporting success.
- name: Wait for ACME certificate to be issued
  when: pbs_acme_cert_order_result is changed
  ansible.builtin.uri:
    url: "{{ pbs_api_base_url }}/nodes/{{ ansible_facts['hostname'] }}/certificates/info"
    method: GET
    headers: "{{ pbs_api_headers }}"
    validate_certs: false
    return_content: true
  register: pbs_node_certs_info_after_order
  until: >-
    (pbs_node_certs_info_after_order.content | from_json).data
    | selectattr('issuer', 'defined')
    | selectattr('issuer', 'search', "Let's Encrypt")
    | list | length > 0
  retries: 30
  delay: 5
  changed_when: false
