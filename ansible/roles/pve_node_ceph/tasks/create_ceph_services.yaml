---
- name: Get ceph.conf stat
  ansible.builtin.stat:
    path: /etc/ceph/ceph.conf
  register:
    ceph_conf_stat_result
- name: Set ceph_conf fact
  when: ceph_conf_stat_result.stat.exists is true
  block:
    - name: Get ceph.conf base64 encoded contents
      ansible.builtin.slurp:
        src: /etc/ceph/ceph.conf
      register: ceph_conf_slurp_result
    - name: Set ceph_conf fact
      ansible.builtin.set_fact:
        ceph_conf: "{{ ceph_conf_slurp_result.content | b64decode }}"
- name: Set empty ceph_conf fact
  when: ceph_conf_stat_result.stat.exists is false
  ansible.builtin.set_fact:
    ceph_conf: ""
- name: Get ceph status
  ansible.builtin.command:
    cmd: pveceph status
  register: pveceph_status_result
  changed_when: false
  failed_when: false

# If /etc/ceph/ceph.conf already exists, the cluster has been configured
# (we're not on a fresh install), so a non-zero `pveceph status` means
# the mons aren't reachable from this host — almost always a cluster-
# network connectivity problem. Surface that clearly instead of falling
# through to `pveceph mon create` which would fail with the cryptic
# "Could not connect to ceph cluster despite configured monitors".
- name: Fail clearly if cluster is configured but mons are unreachable
  when:
    - ceph_conf_stat_result.stat.exists
    - pveceph_status_result.rc != 0
  ansible.builtin.fail:
    msg: >-
      /etc/ceph/ceph.conf exists but `pveceph status` failed (rc={{
      pveceph_status_result.rc }}). The cluster is configured but mons
      are not reachable from this host. Check the cluster network: link
      state on the cluster NIC, ARP/ping to the other mons, and
      `ceph_mon_address` ({{ ceph_mon_address | default('<unset>') }})
      reachability. Stderr was: {{ pveceph_status_result.stderr | default('') }}

- name: Set ceph_monitors, ceph_managers
  when: pveceph_status_result.rc == 0
  vars:
    mon_regex: '^\s*(mon:.*$)'
    mgr_regex: '^\s*(mgr:.*$)'
  ansible.builtin.set_fact:
    ceph_monitors: "{{ pveceph_status_result.stdout | regex_search(mon_regex, multiline=True) }}"
    ceph_managers: "{{ pveceph_status_result.stdout | regex_search(mgr_regex, multiline=True) }}"
- name: Set empty ceph_monitors, ceph_managers
  when: pveceph_status_result.rc != 0
  ansible.builtin.set_fact:
    ceph_monitors: []
    ceph_managers: []
- name: Create ceph monitor
  # vars:
  #   monitor_name: "mon.{{ ansible_facts['hostname'] }}"
  when: "ansible_facts['hostname'] not in ceph_monitors"
  ansible.builtin.command:
    cmd: "pveceph mon create --mon-address {{ ceph_mon_address }}"
  register: pveceph_mon_create_result
  changed_when: true
  # changed_when: pveceph_mon_create_result.rc == 0
  # failed_when: pveceph_mon_create_result.rc != 0 and pveceph_mon_create_result.rc != 255
- name: Create ceph manager
  when: "ansible_facts['hostname'] not in ceph_managers"
  ansible.builtin.command:
    cmd: pveceph mgr create
  register: pveceph_mgr_create_result
  changed_when: true
  # changed_when: pveceph_mgr_create_result.rc == 0
  # failed_when: pveceph_mgr_create_result.rc != 0 and pveceph_mgr_create_result.rc != 255
- name: Stat MDS data directory
  ansible.builtin.stat:
    path: "/var/lib/ceph/mds/ceph-{{ ansible_facts['hostname'] }}"
  register: pve_node_ceph_mds_data_dir_stat
- name: Create ceph Metadata Server
  vars:
    mds_name: "mds.{{ ansible_facts['hostname'] }}"
  # Recreate the MDS daemon if either the cluster ceph.conf doesn't reference
  # it, or the local data dir is missing (e.g. after a host reinstall where
  # the conf section persists in the cluster-shared /etc/pve/priv/ceph.conf
  # but /var/lib/ceph/mds/ceph-<host> is gone).
  when: mds_name not in ceph_conf or not pve_node_ceph_mds_data_dir_stat.stat.exists
  ansible.builtin.command:
    cmd: pveceph mds create
  register: pveceph_mds_create_result
  changed_when: true
  # changed_when: pveceph_mds_create_result == 0
  # failed_when: pveceph_mds_create_result.rc != 0 and pveceph_mds_create_result.rc != 255
- name: Get CRUSH map # noqa risky-shell-pipe
  ansible.builtin.shell:
    cmd: ceph osd getcrushmap | crushtool -d -
  register: ceph_crush_map_result
  changed_when: false
- name: Create ceph OSD
  when:
    - pve_node_ceph_osd_mode == 'create'
    - ansible_facts['hostname'] not in ceph_crush_map_result.stdout
  ansible.builtin.command:
    cmd: pveceph osd create {{ pve_ceph_osd_device }}
  register: pveceph_osd_create_result
  changed_when: pveceph_osd_create_result == 0
  failed_when: pveceph_osd_create_result.rc != 0 # and pveceph_osd_create_result.rc != 25
- name: Activate existing ceph OSD
  # No CRUSH-map gate here on purpose: on a reinstalled host the OSD's
  # CRUSH entry persists in the cluster (the OSD was never removed,
  # just down), so a "skip if hostname in CRUSH" check would skip the
  # very case this block exists to handle. The inner tasks gate
  # themselves so they don't falsely report `changed` on a fully-
  # provisioned host.
  when: pve_node_ceph_osd_mode == 'activate_existing'
  block:
    # /var/lib/ceph/osd/ceph-N is what `ceph-volume lvm activate --all`
    # creates and populates, so its presence is a reliable proxy for
    # "already activated." Probe first so we can skip the activate
    # command when nothing needs doing.
    - name: Probe for existing local OSD directories
      ansible.builtin.find:
        paths: /var/lib/ceph/osd
        file_type: directory
        patterns: 'ceph-*'
      register: pve_node_ceph_local_osd_dirs_probe
    - name: Activate all LVM-backed OSDs on this host
      when: pve_node_ceph_local_osd_dirs_probe.matched == 0
      ansible.builtin.command:
        cmd: ceph-volume lvm activate --all
      register: pve_node_ceph_volume_activate_result
      changed_when: true
    # Always re-discover (even when probe already found dirs). Doing it
    # unconditionally avoids a register-on-skipped pitfall where the
    # variable would otherwise become a "skipped" stub with no .files.
    - name: Discover local OSD directories
      ansible.builtin.find:
        paths: /var/lib/ceph/osd
        file_type: directory
        patterns: 'ceph-*'
      register: pve_node_ceph_local_osd_dirs

    # `ceph-volume lvm activate` enables units with --runtime (transient) and
    # tries to start them. If earlier prestart attempts hit the systemd
    # restart-rate-limit (e.g. before /var/lib/ceph/osd/ceph-N existed), the
    # start fails silently and the OSD ends up disabled+inactive. Detect
    # which units are actually in failed state, then reset only those — so
    # `changed` is real signal that something was reset, not noise on every
    # run.
    - name: Check failed state of ceph-osd units
      ansible.builtin.command:
        cmd: "systemctl is-failed ceph-osd@{{ item.path | basename | regex_replace('^ceph-', '') }}.service"
      loop: "{{ pve_node_ceph_local_osd_dirs.files }}"
      register: pve_node_ceph_osd_failed_states
      changed_when: false
      failed_when: false  # rc=0 means unit IS failed; rc!=0 means not failed

    - name: Reset failed state on ceph-osd units (clears systemd rate-limit)
      when: item.rc == 0
      ansible.builtin.command:
        cmd: "systemctl reset-failed ceph-osd@{{ item.item.path | basename | regex_replace('^ceph-', '') }}.service"
      loop: "{{ pve_node_ceph_osd_failed_states.results }}"
      changed_when: true

    - name: Enable and start ceph-osd units
      ansible.builtin.systemd_service:
        name: "ceph-osd@{{ item.path | basename | regex_replace('^ceph-', '') }}.service"
        enabled: true
        state: started
      loop: "{{ pve_node_ceph_local_osd_dirs.files }}"

# Defensive cleanup: cephfs storage mounts can go zombie when the cluster
# network flaps mid-mount — `ls /mnt/pve/<storage>` then shows
# "d?????????" and `pvesm status` reports the storage inactive. Find any
# such stale mounts under /mnt/pve and force-clear them, then bounce
# pvestatd so it remounts cleanly.
- name: Find cephfs entries in /proc/self/mountinfo
  ansible.builtin.command:
    cmd: awk '$5 ~ /^\/mnt\/pve\// && $9 == "ceph" { print $5 }' /proc/self/mountinfo
  register: pve_node_ceph_cephfs_mounts
  changed_when: false

- name: Stat each cephfs mountpoint to detect stale ones
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ pve_node_ceph_cephfs_mounts.stdout_lines }}"
  register: pve_node_ceph_cephfs_mount_stats
  failed_when: false

- name: Force-unmount stale cephfs mounts
  ansible.builtin.command:
    cmd: "umount -lf {{ item.item }}"
  loop: "{{ pve_node_ceph_cephfs_mount_stats.results }}"
  when: item.failed | default(false) or not (item.stat.exists | default(false))
  register: pve_node_ceph_cephfs_force_unmounts # noqa no-handler
  changed_when: true

- name: Restart pvestatd so it remounts cephfs storages cleanly
  when: pve_node_ceph_cephfs_force_unmounts.changed | default(false) # noqa no-handler
  ansible.builtin.systemd_service:
    name: pvestatd.service
    state: restarted
