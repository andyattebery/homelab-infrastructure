---
# OSD provisioning mode for this node.
#   create            — create a fresh OSD on pve_ceph_osd_device (default).
#   activate_existing — activate any LVM-backed OSDs already on disk (used
#                       when reinstalling the host OS but keeping the OSD
#                       drive intact). Discovers id + fsid via
#                       `ceph-volume lvm activate --all` and the
#                       /var/lib/ceph/osd/ceph-N directories — no per-host
#                       config required.
pve_node_ceph_osd_mode: create
