---
services:
  scrutiny-influxdb:
    image: influxdb:2.2
    container_name: scrutiny-influxdb
    networks:
      - scrutiny
    volumes:
      - ${DOCKER_DATA_DIRECTORY}/scrutiny-influxdb:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 5s
      timeout: 10s
      retries: 20
  scrutiny-web:
    image: ghcr.io/analogj/scrutiny:latest-web
    container_name: scrutiny-web
    restart: unless-stopped
    environment:
      SCRUTINY_WEB_INFLUXDB_HOST: 'scrutiny-influxdb'
    depends_on:
      scrutiny-influxdb:
        condition: service_healthy
    volumes:
      - ${DOCKER_DATA_DIRECTORY}/scrutiny/log:/opt/scrutiny/log
      - ${DOCKER_DATA_DIRECTORY}/scrutiny/config/scrutiny.db:/opt/scrutiny/config/scrutiny.db
      - ${DOCKER_DATA_DIRECTORY}/scrutiny/config/scrutiny.yaml:/opt/scrutiny/config/scrutiny.yaml
    networks:
      - scrutiny
      - traefik
      - tsdproxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.scrutiny.rule=Host(`scrutiny.$DOMAIN_NAME`)
      - traefik.http.routers.scrutiny.service=scrutiny
      - traefik.http.services.scrutiny.loadbalancer.server.port=8080
      - dsm.name=Scrutiny
      - tsdproxy.enable=true
      - tsdproxy.name=scrutiny
      - "tsdproxy.port.1=443/https:8080/http"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

networks:
  scrutiny:
    name: scrutiny
  traefik:
    name: traefik
    external: true
  tsdproxy:
    name: tsdproxy
    external: true
