---
# Bulk copy of static config directory trees. Sibling of copy_config_files.yaml.
# Note: ansible.builtin.copy recurses on directory sources but does NOT render
# Jinja templates — any .j2 files in the tree are copied literally. For mixed
# static + template trees, use the per-file docker_compose_src_config_files
# var (which goes through ansible.builtin.template) instead.
- name: Create config directory destinations
  ansible.builtin.file:
    dest: "{{ (docker_compose_dst_data_directory_path, config_dir.dst_relative_dir_path) | path_join }}"
    state: directory
    owner: "{{ docker_compose_uid }}"
    group: "{{ docker_compose_gid }}"
    mode: "{{ config_dir.directory_mode | default('0755') }}"
  loop: "{{ docker_compose_src_config_dirs }}"
  loop_control:
    loop_var: config_dir
- name: Copy config directories
  ansible.builtin.copy:
    src: "{{ config_dir.src_dir_path }}/"
    dest: "{{ (docker_compose_dst_data_directory_path, config_dir.dst_relative_dir_path) | path_join }}/"
    owner: "{{ docker_compose_uid }}"
    group: "{{ docker_compose_gid }}"
    mode: "{{ config_dir.mode | default('0644') }}"
    directory_mode: "{{ config_dir.directory_mode | default('0755') }}"
  loop: "{{ docker_compose_src_config_dirs }}"
  loop_control:
    loop_var: config_dir
  register: copy_config_dirs_result
- name: Restart services for changed config directories
  ansible.builtin.include_tasks:
    file: restart_container.yaml
  loop: "{{ copy_config_dirs_result.results | selectattr('changed') | map(attribute='config_dir.service_name_to_restart', default='') | select('!=', '') | unique | list }}"
  loop_control:
    loop_var: service_name_to_restart
