---
- name: Get host IP
  ansible.builtin.command:
    cmd: hostname -i
  changed_when: false
  register:
    host_ip_result
# Determine whether this node is already in a PVE cluster.
# We check for /etc/pve/corosync.conf rather than parsing `pvecm status`'s
# exit code — its rc semantics have changed across PVE releases (notably
# PVE 9 doesn't return rc=2 for "not in cluster" the way earlier versions
# did, which previously caused the create to be silently skipped).
- name: Check whether node is already in a PVE cluster
  ansible.builtin.stat:
    path: /etc/pve/corosync.conf
  register: pve_cluster_create_corosync_conf_stat
- name: Get cluster fingerprint
  when: pve_cluster_create_corosync_conf_stat.stat.exists
  block:
    - name: Get cluster join info
      ansible.builtin.command:
        cmd: pvesh get /cluster/config/join --output-format json
      changed_when: false
      register: pve_cluster_join_info_json_result
    - name: Register main node fingerprint
      vars:
        pve_cluster_join_info_json: "{{ pve_cluster_join_info_json_result.stdout }}"
      ansible.builtin.set_fact:
        pve_cluster_fingerprint: "{{ pve_cluster_join_info_json.nodelist[0].pve_fp }}"
- name: Create PVE cluster # noqa no-changed-when
  when: not pve_cluster_create_corosync_conf_stat.stat.exists
  ansible.builtin.command:
    cmd: pvecm create {{ pve_cluster_name }} --link0 {{ pve_main_node_ip }}
