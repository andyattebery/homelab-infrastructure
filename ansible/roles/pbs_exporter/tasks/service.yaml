---
- name: Render pbs_exporter env file
  ansible.builtin.template:
    src: pbs_exporter.env.j2
    dest: "{{ pbs_exporter_env_path }}"
    mode: "0640"
    owner: root
    group: "{{ pbs_exporter_username }}"
  notify: Restart pbs_exporter
- name: Copy pbs_exporter.service
  ansible.builtin.template:
    src: pbs_exporter.service.j2
    dest: /etc/systemd/system/pbs_exporter.service
    mode: "0644"
    owner: root
  notify: Restart pbs_exporter
- name: Enable and start pbs_exporter.service
  ansible.builtin.systemd_service:
    daemon_reload: true
    name: pbs_exporter.service
    state: started
    enabled: true
