---
# natrontech/pbs-exporter tarball contains the binary at the archive
# root, named with an arch suffix (e.g. `pbs-exporter-linux-amd64`).
- name: Set arch suffix fact
  ansible.builtin.set_fact:
    pbs_exporter_arch_suffix: >-
      {{ {'x86_64': 'linux-amd64', 'aarch64': 'linux-arm64'}[ansible_facts['architecture']] }}

- name: Install pbs_exporter
  ansible.builtin.include_role:
    name: github_release_install
  vars:
    github_release_install_repo: natrontech/pbs-exporter
    github_release_install_asset_patterns:
      x86_64: "linux_amd64\\.tar\\.gz$"
      aarch64: "linux_arm64\\.tar\\.gz$"
    github_release_install_archive_type: tarball
    github_release_install_binary_in_archive: "pbs-exporter-{{ pbs_exporter_arch_suffix | trim }}"
    github_release_install_binary_path: "{{ pbs_exporter_bin_path }}"
    github_release_install_version_command: "{{ pbs_exporter_bin_path }} --version"
