---
- name: Install smartmontools
  ansible.builtin.apt:
    name:
      - smartmontools

- name: Resolve scrutiny collector binary name for this architecture
  ansible.builtin.set_fact:
    scrutiny_collector_bin_name: "{{ ({'x86_64':'scrutiny-collector-metrics-linux-amd64','aarch64':'scrutiny-collector-metrics-linux-arm64'})[ansible_facts['architecture']] }}"

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    mode: "0755"
  loop:
    - "{{ scrutiny_bin_dir }}"
    - "{{ scrutiny_config_dir }}"

- name: Copy config
  ansible.builtin.template:
    src: templates/collector.yaml.j2
    dest: "{{ (scrutiny_config_dir, 'collector.yaml') | path_join }}"
    mode: "0644"

- name: Install scrutiny-collector binary
  ansible.builtin.include_role:
    name: github_release_install
  vars:
    github_release_install_repo: AnalogJ/scrutiny
    github_release_install_asset_patterns:
      x86_64: "scrutiny-collector-metrics-linux-amd64"
      aarch64: "scrutiny-collector-metrics-linux-arm64"
    github_release_install_archive_type: binary
    github_release_install_binary_path: "{{ (scrutiny_bin_dir, scrutiny_collector_bin_name) | path_join }}"
    # Default version_command (`{{ binary_path }} --version`) works:
    # urfave/cli auto-registers --version on the binary and outputs
    # `<bin> version vX.Y.Z` which the default regex matches.

- name: Copy scrutiny-collector.service
  ansible.builtin.template:
    src: scrutiny-collector.service.j2
    dest: /etc/systemd/system/scrutiny-collector.service
    mode: "0644"
    owner: root

- name: Copy scrutiny-collector.timer
  ansible.builtin.template:
    src: scrutiny-collector.timer.j2
    dest: /etc/systemd/system/scrutiny-collector.timer
    mode: "0644"
    owner: root

# Enable the service so it runs once at boot (collector populates
# fresh data immediately after a reboot, useful if the host was off
# across the timer's schedule). Don't `state: started` it from the
# playbook — that'd block the playbook for ExecStartPre's 60s sleep
# every run. systemd serializes activations on a unit, so there's no
# race if the timer fires during the boot-time run: with
# Type=oneshot, the second activation is queued and runs after the
# first completes.
- name: Enable scrutiny-collector.service (runs once at boot)
  ansible.builtin.systemd_service:
    daemon_reload: true
    name: "scrutiny-collector.service"
    enabled: true

- name: Enable and start scrutiny-collector.timer
  ansible.builtin.systemd_service:
    daemon_reload: true
    name: "scrutiny-collector.timer"
    state: started
    enabled: true
