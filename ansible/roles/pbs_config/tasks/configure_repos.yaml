---
# Detect which apt sources format the host is actively using by scanning
# /etc/apt/sources.list.d/ for uncommented entries. We follow whatever
# the host is actually using rather than guessing from the distribution
# release — a host upgraded from PBS 3 to PBS 4 may still be on legacy
# .list files, and a freshly-installed PBS 4 host uses deb822 .sources.
#
# PBS does not ship ceph repos, so there is no ceph cleanup analog here
# (unlike pve_config).
- name: Find .sources files with active Types entries
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: '*.sources'
    contains: '(?m)^\s*Types:'
    file_type: file
  register: pbs_config_deb822_files

- name: Find .list files with active deb entries
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: '*.list'
    contains: '(?m)^\s*deb\s'
    file_type: file
  register: pbs_config_list_files

- name: Determine which apt sources format is in use
  ansible.builtin.set_fact:
    pbs_config_use_deb822: "{{ pbs_config_deb822_files.matched > 0 }}"
    pbs_config_has_legacy_active: "{{ pbs_config_list_files.matched > 0 }}"

- name: Fail if no active apt source could be detected
  when:
    - not pbs_config_use_deb822
    - not pbs_config_has_legacy_active
  ansible.builtin.fail:
    msg: >-
      Could not detect any active apt source under
      /etc/apt/sources.list.d/. No .sources files with uncommented
      Types: entries and no .list files with uncommented deb entries
      were found. Verify apt configuration on this host before running
      pbs_config.

- name: Remove unwanted apt source files (always)
  ansible.builtin.file:
    path: "/etc/apt/sources.list.d/{{ item }}"
    state: absent
  loop: "{{ pbs_config_remove_files_always }}"
  notify: Update apt cache

# deb822 path
- name: Configure deb822 sources
  when: pbs_config_use_deb822
  block:
    - name: Write PBS no-subscription deb822 source
      ansible.builtin.template:
        src: proxmox.sources.j2
        dest: /etc/apt/sources.list.d/proxmox.sources
        owner: root
        group: root
        mode: "0644"
      notify: Update apt cache
    - name: Remove legacy .list versions of managed repos
      ansible.builtin.file:
        path: "/etc/apt/sources.list.d/{{ item }}"
        state: absent
      loop: "{{ pbs_config_remove_files_when_deb822 }}"
      notify: Update apt cache

# Legacy .list path
- name: Configure legacy .list sources
  when: not pbs_config_use_deb822
  block:
    - name: Add PBS no-subscription repository
      ansible.builtin.apt_repository:
        repo: deb http://download.proxmox.com/debian/pbs {{ ansible_facts['distribution_release'] }} pbs-no-subscription
        filename: pbs-no-subscription
        state: present
        update_cache: false
      notify: Update apt cache

# Run the apt cache update now (rather than at end of play) so subsequent
# tasks in this run see the new sources.
- name: Flush handlers (runs Update apt cache if any source changed)
  ansible.builtin.meta: flush_handlers
