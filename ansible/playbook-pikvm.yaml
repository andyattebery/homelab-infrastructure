---
- name: Configure all pikvms
  hosts:
    - pikvm
    - pikvm-hid
    - offsite-pikvm
  gather_facts: false # Gathering facts will fail because of the readonly filesystem
  vars:
    pikvm_os: true

  pre_tasks:
    - name: Enable read/write on filesystem
      ansible.builtin.raw: rw
      changed_when: false
    - name: Gather facts
      ansible.builtin.setup:
  post_tasks:
    - name: Disable read/write on filesystem
      ansible.builtin.raw: ro
      changed_when: false

  roles:
    - role: pikvm
    - role: remote_power_control
      when: inventory_hostname == 'pikvm'
      vars:
        remote_power_control_client: true
        remote_power_control_client_private_key: "{{ pikvm_kvmd_ssh_private_key }}"
    - pikvm_tailscale_exit_node
    - role: pikvm_certbot_dns_cloudflare # Creating cert for local DNS name
      when: inventory_hostname == 'pikvm' or inventory_hostname == 'pikvm-hid'
      vars:
        pikvm_certbot_dns_cloudflare_cert_domain: "{{ inventory_hostname }}.{{ domain_name }}"
    - role: pikvm_tailscale_certificate # Creating cert for tailscale DNS name
      when: inventory_hostname == 'offsite-pikvm'
    - role: pikvm_hid_kvm_switch_input
      when: inventory_hostname == 'pikvm'
      vars:
        pikvm_hid_username: "{{ pikvm_hid_api_username }}"
        pikvm_hid_password: "{{ pikvm_hid_api_password }}"
        pikvm_hid_hostname: "pikvm-hid.{{ domain_name }}"
    - role: esphome_api_cli
      when: inventory_hostname == 'pikvm'
    - role: beszel_agent

  handlers:
    - name: Restart prometheus-node-exporter
      ansible.builtin.systemd_service:
        name: prometheus-node-exporter.service
        state: restarted

  tasks:
    - name: Install prometheus-node-exporter
      community.general.pacman:
        name: prometheus-node-exporter
        state: present
    - name: Enable and start prometheus-node-exporter.service
      ansible.builtin.systemd_service:
        name: prometheus-node-exporter.service
        state: started
        enabled: true
    - name: Mount tmpfs for node_exporter textfile collector
      ansible.posix.mount:
        path: /var/lib/node_exporter
        src: tmpfs
        fstype: tmpfs
        opts: "nodev,nosuid,size=1M"
        state: mounted
    - name: Configure node_exporter textfile directory
      ansible.builtin.copy:
        content: |
          NODE_EXPORTER_ARGS="--collector.textfile.directory=/var/lib/node_exporter"
        dest: /etc/conf.d/prometheus-node-exporter
        mode: "0644"
      notify: Restart prometheus-node-exporter
    - name: Configure pacman-updates textfile collector
      ansible.builtin.include_role:
        name: textfile_collector_pacman_updates
    - name: Generate locale
      community.general.locale_gen:
        name: "{{ locale }}"
    - name: Set locale
      ansible.builtin.command:
        cmd: "localectl set-locale LANG={{ locale }}"
      changed_when: false
    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"
