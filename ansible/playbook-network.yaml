---
- name: Configure network hosts
  hosts: network
  become: true

  roles:
    - configure_server
    - geerlingguy.docker
    - role: artis3n.tailscale.machine
      vars:
        # Disable MagicDNS so it doesn't overwrite /etc/resolv.conf (legacy).
        # Advertise as exit node + subnet router for the homelab LAN.
        tailscale_args: "--accept-dns=false --advertise-exit-node --advertise-routes={{ subnet_cidr }}"
    - disable_resolved_dns_stub_listener
    - role: docker_compose_adguardhome
      when: inventory_hostname != 'network-01'
    - docker_compose_dashboard_services_manager_provider
    - docker_compose_diun
    - role: docker_compose_keepalived
      vars:
        keepalived_network_mode: host
        keepalived_instance_name: adguardhome
        keepalived_interface: eth0
        keepalived_virtual_ipaddress: "{{ dns_server_vip }}"
        # Redirects (>/dev/null 2>&1) intentionally omitted — keepalived parses
        # the script string by whitespace into argv and exec's directly (no shell),
        # so redirects would be passed as literal arguments. nslookup output ends
        # up in keepalived's own log, which is acceptable.
        keepalived_track_script_command: "/usr/bin/timeout 2 /usr/bin/nslookup healthcheck.adguardhome.test 127.0.0.1"
    - role: docker_compose_wireguard

- name: Configure textfile collectors on network-01
  hosts: network-01
  become: true
  roles:
    - role: textfile_collector
      vars:
        textfile_collector_name: adguardhome-sync
        textfile_collector_interval_seconds: 300
        textfile_collector_source_cmd: >-
          ts=$(docker logs --since=24h adguardhome-sync 2>&1 | grep 'Sync done' | tail -1 | awk '{print $1}');
          [ -n "$ts" ] && printf 'adguardhome_sync_last_success_timestamp %d\n' "$(date -d "$ts" +%s)"

- name: Configure origin adguardhome host
  hosts: network-01
  become: true
  tasks:
    - name: Clone settings repository # noqa latest[git]
      become: false
      ansible.builtin.git:
        repo: git@github.com:andyattebery/settings.git
        accept_newhostkey: true
        dest: ~/settings
    - name: Configure adguardhome
      ansible.builtin.include_role:
        name: docker_compose_adguardhome
    - name: Configure adguardhome-sync
      vars:
        adguardhome_sync_hostname: "{{ adguardhome_hostname }}"
      ansible.builtin.include_role:
        name: docker_compose_adguardhome_sync
