---
ManagerOptions:
  DashboardManagers:
    - DashboardManagerType: Dashy
      DashboardConfigDirectoryPath: /dashy_config
    - DashboardManagerType: Homepage
      DashboardConfigDirectoryPath: /homepage_config
      EnableStatusMonitoring: true
      SourceHomepageServiceWidgetsFilePath: /config/homepage-service-widgets.yaml
  IgnoredServiceNames:
    - Dashy
    - Dashboard Services Manager
    - Homepage
    - Minio S3
    - Netbootxyz Assets
    - Ollama

# Override or extend bundled defaults (see service-defaults.yaml shipped with the app):
ServiceDefaultOptions:
  Services:
    adguard home:
      NameWithHostnameFormatString: AdGuard Home (%s)
      Category: network
      Icon: hl-adguard-home
    adguard home sync:
      Category: network
    comfyui:
      NameWithHostnameFormatString: ComfyUI
      Category: ai
    frigate:
      Category: smart home
    kohya ss:
      NameWithHostnameFormatString: koyha-ss
      Category: ai
    swarmui:
      NameWithHostnameFormatString: SwarmUI
      Category: ai
    tensorboard:
      Category: ai
      Icon: hl-tensorflow
