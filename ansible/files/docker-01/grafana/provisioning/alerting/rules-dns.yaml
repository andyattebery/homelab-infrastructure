# DNS HA alerts: keepalived VIP ownership + AdGuard sync freshness.
#
# Metric grounding:
# - keepalived_vrrp_state (mehdy/keepalived-exporter v1.7.1+):
#   0=Init, 1=Backup, 2=Master, 3=Fault.
#   Exporter uses --ka.container.pid-path to send signals via docker exec
#   (not docker kill), avoiding s6-overlay signal conflicts.
# - adguard_home_sync_sync_successful (built-in metrics on network-01:8080/metrics):
#   1 if last sync succeeded, 0 if it failed. Per-replica hostname label.
apiVersion: 1
groups:
  - orgId: 1
    name: dns-ha
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: keepalived-no-master
        title: Keepalived VIP has no master
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: fe8ew4zkvbf28a
            model:
              datasource:
                type: prometheus
                uid: fe8ew4zkvbf28a
              expr: sum(keepalived_vrrp_state == 2) == 0
              instant: true
              refId: A
        for: 1m
        noDataState: OK
        execErrState: Alerting
        isPaused: false
        labels:
          severity: critical
          component: dns
        annotations:
          summary: 'No keepalived master for the DNS VIP'
          description: |
            No peer reports keepalived_vrrp_state == 2 (Master) for 1+ minute.
            DNS resolution via the VIP is down. Check keepalived logs on all three
            peers: `docker logs keepalived` on network-01, network-03, pi-rack.

      - uid: adguardhome-sync-drift
        title: AdGuard sync failing
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: fe8ew4zkvbf28a
            model:
              datasource:
                type: prometheus
                uid: fe8ew4zkvbf28a
              expr: min(adguard_home_sync_sync_successful) == 0
              instant: true
              refId: A
        for: 10m
        noDataState: OK
        execErrState: Alerting
        isPaused: false
        labels:
          severity: warning
          component: dns
        annotations:
          summary: 'AdGuard sync failing for at least one replica'
          description: |
            At least one replica's last sync has been failing for 10+ minutes.
            Check `journalctl -u adguardhome-sync` on network-01 for errors.
