---
services:
  cup:
    image: ghcr.io/sergi0g/cup
    container_name: cup
    command: ["serve"]
    restart: unless-stopped
    networks:
      - traefik
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - traefik.enable=true
  dockwatch:
    container_name: dockwatch
    image: ghcr.io/notifiarr/dockwatch:main
    restart: unless-stopped
    environment:
      #-DOCKER_HOST=127.0.0.1:2375 # Uncomment and adjust accordingly if you use a socket proxy
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    networks:
      - traefik
    volumes:
      - ${DOCKER_DATA_DIRECTORY}/dockwatch/config:/config
      - /var/run/docker.sock:/var/run/docker.sock # Comment this line if you use a socket proxy
    labels:
      - traefik.enable=true
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    user: 472:${PGID} # 472:1000  # https://github.com/grafana/grafana/issues/41217
    environment:
     - GF_SERVER_ROOT_URL=https://grafana.$DOMAIN_NAME
     # Read by the file-provisioned Pushover contact point via $ENV substitution.
     - GRAFANA_PUSHOVER_APP_TOKEN=${GRAFANA_PUSHOVER_APP_TOKEN}
     - GRAFANA_PUSHOVER_USER_KEY=${GRAFANA_PUSHOVER_USER_KEY}
     # Read by provisioned InfluxDB datasources (see
     # provisioning/datasources/influxdb.yaml) via $ENV substitution.
     - INFLUXDB_HEALTHCHECKS_TOKEN=${INFLUXDB_HEALTHCHECKS_TOKEN}
     - INFLUXDB_PROXMOX_READ_TOKEN=${INFLUXDB_PROXMOX_READ_TOKEN}
     - DOMAIN_NAME=${DOMAIN_NAME}
    networks:
      - traefik
    volumes:
      - ${DOCKER_DATA_DIRECTORY}/grafana:/var/lib/grafana
      # File provisioning: provider configs, datasources, alert rules, contact points.
      # Mount read-only; source of truth is in the homelab-infrastructure repo at
      # ansible/files/docker-01/grafana/provisioning/.
      - ${DOCKER_DATA_DIRECTORY}/grafana-provisioning:/etc/grafana/provisioning:ro
      # Dashboard JSON files (loaded by the provider config above).
      - ${DOCKER_DATA_DIRECTORY}/grafana-dashboards:/var/lib/grafana/dashboards:ro
    labels:
      - traefik.enable=true
  healthchecks:
    image: lscr.io/linuxserver/healthchecks:latest
    container_name: healthchecks
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - SITE_ROOT=https://healthchecks.${DOMAIN_NAME}
      - SITE_NAME=Healthchecks
      - DEFAULT_FROM_EMAIL=healthchecks@${DOMAIN_NAME}
      - EMAIL_HOST=${HEALTHCHECKS_EMAIL_HOST}
      - EMAIL_PORT=${HEALTHCHECKS_EMAIL_PORT}
      - EMAIL_HOST_USER=${HEALTHCHECKS_EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${HEALTHCHECKS_EMAIL_HOST_PASSWORD}
      - EMAIL_USE_TLS=${HEALTHCHECKS_EMAIL_USE_TLS}
      - SUPERUSER_EMAIL=${HEALTHCHECKS_SUPERUSER_EMAIL}
      - SUPERUSER_PASSWORD=${HEALTHCHECKS_SUPERUSER_PASSWORD}
      - REGENERATE_SETTINGS=True #optional
      - APPRISE_ENABLED=False #optional
      - PUSHOVER_API_TOKEN=${HEALTHCHECKS_PUSHOVER_API_TOKEN}
      - PUSHOVER_SUBSCRIPTION_URL=${HEALTHCHECKS_PUSHOVER_SUBSCRIPTION_URL}
      - DEBUG=False
    networks:
      - traefik
    volumes:
      - ${DOCKER_DATA_DIRECTORY}/healthchecks:/config
    labels:
      - traefik.enable=true
  influxdb2:
    image: influxdb:2
    container_name: influxdb2
    restart: unless-stopped
    ports:
      - 8086:8086
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_INIT_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_INIT_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_INIT_BUCKET}
    volumes:
      - ${DOCKER_DATA_DIRECTORY}/influxdb2/data:/var/lib/influxdb2
      - ${DOCKER_DATA_DIRECTORY}/influxdb2/config:/etc/influxdb2
  prometheus:
    image: quay.io/prometheus/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    user: ${PUID}:${PGID}
    networks:
      - traefik
    volumes:
      - ${DOCKER_DATA_DIRECTORY}/prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ${DOCKER_DATA_DIRECTORY}/prometheus/data:/prometheus
    labels:
      - traefik.enable=true
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    networks:
      - traefik
    volumes:
      - ${DOCKER_DATA_DIRECTORY}/uptime-kuma/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - traefik.enable=true

  pve-exporter:
    image: prompve/prometheus-pve-exporter:latest
    container_name: pve-exporter
    restart: unless-stopped
    networks:
      - traefik
    environment:
      - PVE_USER=ro-api@pam
      - PVE_TOKEN_NAME=${PVE_MONITORING_TOKEN_NAME}
      - PVE_TOKEN_VALUE=${PVE_MONITORING_TOKEN_VALUE}
      - PVE_VERIFY_SSL=false
  adguard-exporter:
    image: ghcr.io/henrywhitaker3/adguard-exporter:latest
    container_name: adguard-exporter
    restart: unless-stopped
    networks:
      - traefik
    environment:
      - ADGUARD_SERVERS=${ADGUARD_SERVERS}
      - ADGUARD_USERNAMES=${ADGUARD_USERNAMES}
      - ADGUARD_PASSWORDS=${ADGUARD_PASSWORDS}
  ipmi-exporter:
    image: prometheuscommunity/ipmi-exporter:latest
    container_name: ipmi-exporter
    restart: unless-stopped
    networks:
      - traefik
    volumes:
      - ${DOCKER_DATA_DIRECTORY}/ipmi-exporter/ipmi-exporter.yml:/config/ipmi.yml:ro
    command: ["--config.file=/config/ipmi.yml"]

networks:
  traefik:
    name: traefik
    external: true
