  faster-whisper:
    image: wyoming-whisper:r36.5.tegra-aarch64-cu126-22.04
    pull_policy: never
    <<: *shared-properties
    container_name: faster-whisper
    hostname: faster-whisper
    ports:
      - "10300:10300/tcp"
    volumes:
      - ${DOCKER_DATA_DIRECTORY}/models/huggingface:/data/models/huggingface
      - ${DOCKER_DATA_DIRECTORY}/models/whisper:/data/models/faster-whisper
      - /etc/localtime:/etc/localtime:ro

  piper-tts:
    image: wyoming-piper:r36.5.tegra-aarch64-cu126-22.04
    pull_policy: never
    <<: *shared-properties
    container_name: piper-tts
    hostname: piper-tts
    ports:
      - "10200:10200/tcp"
    volumes:
      - ${DOCKER_DATA_DIRECTORY}/models/piper:/data/models/piper
      - /etc/localtime:/etc/localtime:ro
    environment:
      PIPER_VOICE: "en_US-lessac-high"